<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Sala Reuniones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app" data-status="free">
    <!-- Header -->
    <header class="header">
      <h1 class="room-name" id="room-name">Sala Reuniones</h1>
      <img class="header-logo" src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest" />
    </header>

    <main class="main">
      <!-- Left panel: status -->
      <section class="status-panel" id="status-panel">
        <div class="status-top">
          <div class="clock">
            <span class="clock-time" id="clock-time">--:--</span>
            <span class="clock-date" id="clock-date">—</span>
          </div>
          <div class="status-label" id="status-label">LIBRE</div>
          <div class="status-sublabel" id="status-sublabel">—</div>
        </div>

        <!-- FREE state: quick booking -->
        <div class="quick-actions" id="quick-actions">
          <div class="quick-actions-title">Reservar ahora</div>
          <div class="quick-actions-grid">
            <button class="quick-btn" data-quick-mins="15">
              <span class="quick-btn-num">15</span>
              <span class="quick-btn-unit">min</span>
            </button>
            <button class="quick-btn" data-quick-mins="30">
              <span class="quick-btn-num">30</span>
              <span class="quick-btn-unit">min</span>
            </button>
            <button class="quick-btn" data-quick-mins="60">
              <span class="quick-btn-num">1</span>
              <span class="quick-btn-unit">hora</span>
            </button>
            <button class="quick-btn quick-btn--custom" id="quick-custom">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              <span class="quick-btn-unit">Otra</span>
            </button>
          </div>
        </div>

        <!-- BOOKED state: current meeting + countdown -->
        <div class="booked-info" id="booked-info" hidden>
          <div class="booked-title" id="booked-title">—</div>
          <div class="booked-meta">
            <span class="booked-organizer" id="booked-organizer">—</span>
          </div>
          <div class="countdown">
            <span class="countdown-label">Termina en</span>
            <span class="countdown-time" id="countdown-time">--:--</span>
          </div>
          <button class="end-btn" id="end-btn" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
            Finalizar reunión
          </button>
        </div>

        <!-- Progress bar at the bottom -->
        <div class="progress-bar" id="progress-bar" hidden>
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
      </section>

      <!-- Right panel: events list -->
      <aside class="events-panel">
        <div class="events-header">Agenda</div>
        <div class="events-list" id="events-list">
          <div class="events-empty" id="events-empty">Cargando eventos…</div>
        </div>
      </aside>
    </main>

    <!-- Modal: custom book -->
    <div class="modal" id="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-panel modal-panel--wide">
        <h2 class="modal-title">Reservar sala</h2>
        <label class="modal-field">
          <span>Título de la reunión</span>
          <input type="text" id="book-title" placeholder="Reunión rápida" />
        </label>
        <div class="modal-field">
          <span>¿Quién reserva?</span>
          <div class="people-picker" id="people-picker"></div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <span>Fecha</span>
            <button type="button" class="date-trigger" id="book-date-trigger">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="5" width="18" height="16" rx="2" />
                <line x1="16" y1="3" x2="16" y2="7" />
                <line x1="8" y1="3" x2="8" y2="7" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              <span id="book-date-label">—</span>
            </button>
          </div>
          <label class="modal-field">
            <span>Hora de inicio</span>
            <input type="time" id="book-time" step="900" />
          </label>
        </div>
        <div class="modal-field">
          <span>Duración</span>
          <div class="duration-options" id="duration-options">
            <button type="button" data-mins="15">15 min</button>
            <button type="button" data-mins="30" class="selected">30 min</button>
            <button type="button" data-mins="45">45 min</button>
            <button type="button" data-mins="60">1 hora</button>
            <button type="button" data-mins="90">1h 30min</button>
            <button type="button" data-mins="120">2 horas</button>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" data-close>Cancelar</button>
          <button class="btn btn-primary" id="confirm-book">Confirmar</button>
        </div>
        <div class="modal-error" id="modal-error" hidden></div>
      </div>
    </div>

    <!-- Modal: who's booking (for quick book) -->
    <div class="modal" id="who-modal" hidden>
      <div class="modal-backdrop" data-who-close></div>
      <div class="modal-panel modal-panel--wide">
        <h2 class="modal-title">¿Quién reserva?</h2>
        <p class="modal-text" id="who-modal-text">Reserva rápida de 30 min</p>
        <div class="people-picker people-picker--large" id="who-people-picker"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" data-who-close>Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Modal: quick title (after duration + person) -->
    <div class="modal" id="title-modal" hidden>
      <div class="modal-backdrop" data-title-close></div>
      <div class="modal-panel">
        <h2 class="modal-title">Título de la reunión</h2>
        <p class="modal-text" id="title-modal-text">—</p>
        <label class="modal-field">
          <span>¿De qué trata?</span>
          <input type="text" id="quick-title-input" placeholder="Reunión rápida" autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button class="btn btn-secondary" data-title-close>Cancelar</button>
          <button class="btn btn-primary" id="confirm-title">Reservar</button>
        </div>
        <div class="modal-error" id="title-modal-error" hidden></div>
      </div>
    </div>

    <!-- Modal: confirm end -->
    <div class="modal" id="end-modal" hidden>
      <div class="modal-backdrop" data-end-close></div>
      <div class="modal-panel">
        <h2 class="modal-title">¿Finalizar reunión?</h2>
        <p class="modal-text" id="end-modal-text">La reunión se finalizará ahora.</p>
        <div class="modal-actions">
          <button class="btn btn-secondary" data-end-close>Cancelar</button>
          <button class="btn btn-danger" id="confirm-end">Sí, finalizar</button>
        </div>
        <div class="modal-error" id="end-modal-error" hidden></div>
      </div>
    </div>

    <!-- Date picker (tablet-friendly calendar) -->
    <div class="modal" id="date-modal" hidden>
      <div class="modal-backdrop" data-date-close></div>
      <div class="modal-panel modal-panel--cal">
        <div class="cal-header">
          <button type="button" class="cal-nav" id="cal-prev" aria-label="Mes anterior">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <polyline points="15 6 9 12 15 18" />
            </svg>
          </button>
          <div class="cal-title" id="cal-title">—</div>
          <button type="button" class="cal-nav" id="cal-next" aria-label="Mes siguiente">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <polyline points="9 6 15 12 9 18" />
            </svg>
          </button>
        </div>
        <div class="cal-weekdays">
          <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="cal-today-btn" type="button">Hoy</button>
          <button class="btn btn-secondary" data-date-close>Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
